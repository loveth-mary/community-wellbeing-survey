<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Well-being Survey - Page 9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="success.html">
        <div class="main-header">COMMUNITY WELL-BEING SURVEY</div>
        <div class="container">
            <div class="question">
                <label>Do you have any additional comments or suggestions?</label>
                <textarea rows="4" placeholder="Share your thoughts here..."></textarea>
            </div>

            <div class="question">
                <label>Would you like to be contacted for follow-up (optional)?</label>
                <label for="option">
                    <input type="radio" name="contact" value="yes" required>Yes
                </label>

                <input type="text" placeholder="If yes, enter your email address here!">

                <label for="option">
                    <input type="radio" name="contact" value="no">No
                </label>
            </div>
            
            <div class="button-group">
                <a href="page8.html" class="btn">Back</a>
                <button type="submit" class="btn">Next</button>
            </div>
        </div>
    </form>
</body>
</html>
