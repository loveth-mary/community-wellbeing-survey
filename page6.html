<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Well-being Survey - Page 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-header">COMMUNITY WELL-BEING SURVEY</div>
    <div class="container">
        <label for="living-condition">How would you describe your current living condition?</label>
        <select id="living-condition">
            <option>Select an option</option>
            <option>Comfortable</option>
            <option>Manageable</option>
            <option>Difficult</option>
        </select>

        <label for="financial-security">Do you feel financially secure?</label>
        <select id="financial-security">
            <option>Select an option</option>
            <option>Yes</option>
            <option>No</option>
            <option>Not sure</option>
        </select>

        <label for="expenses">How often do unexpected expenses affect you?</label>
        <select id="expenses">
            <option>Select an option</option>
            <option>Very often</option>
            <option>Sometimes</option>
            <option>Rarely</option>
        </select>

        <label for="savings">Do you have savings set aside for emergencies?</label>
        <select id="savings">
            <option>Select an option</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label for="managing">What helps you manage during difficult financial times?</label>
        <input type="text" id="managing" placeholder="Describe briefly">
        
        <div class="button-group">
            <a href="page5.html" class="btn">Back</a>
            <a href="page7.html" class="btn" next>Next</a>
        </div>
    </div>
</body>
</html>
