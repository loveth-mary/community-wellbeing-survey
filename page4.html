<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Well-being Survey - Page 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-header">COMMUNITY WELL-BEING SURVEY</div>

    <div class="container">
        <h2>Section 4: Economic Stability & Daily Living Condition</h2>
        <p>This section aims to understand how economic factors influence your quality of life, ability to meet basic needs, and challenges you may face in manaqging everyday expenses.</p>

        <label for="exercise">How often do engage in physical exercise?</label>
        <select id="exercise">
            <option>Select an option</option>
            <option>Daily</option>
            <option>Weekly</option>
            <option>Occasionally</option>
            <option>Rarely</option>
        </select>

        <label for="helth-concerns">Do you have ongoing health concerns?</label>
        <select id="helth-concerns">
            <option>Selectb an option</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label for="attention">This is a quality check question. Please select "Sometimes" to confirm you are paying attention.</label>
        <select id="attention">
            <option>Select an option</option>
            <option>Always</option>
            <option>Sometimes</option>
            <option>Never</option>
        </select>

        <label for="occupation">What do you do for a living?</label>
        <input type="text" id="occupation" placeholder="Enter your occupation">

        <label for="income">What are your main sources of income?</label>
        <input type="text" id="income" placeholder="e.g. job, business">

        <label for="support">Do you receive financial support from family or friens?</label>
        <select id="support">
            <option>Select an option</option>
            <option>Yes</option>
            <option>Sometimes</option>
            <option>No</option>
        </select>

        <label for="improvement">What do you think can improve health services in your area?</label>
        <input type="text" id="improvement" placeholder="You can describe briefly or skip">

        <div class="button-group">
            <a href="page3.html" class="btn">Back</a>
            <a href="page5.html" class="btn" next>Next</a>
        </div>
    </div>
</body>
</html>
